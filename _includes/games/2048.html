<style>
  /* ── Wrapper ─────────────────────────────────────────────────────── */
  .t2048 {
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    max-width: 440px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: var(--clr-fg, #c8c8c8);
    user-select: none;
    position: relative;
  }

  /* CRT scanlines */
  .t2048::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Toolbar ─────────────────────────────────────────────────────── */
  .t2048-bar {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 1.6rem;
  }

  .t2048-line {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    line-height: 2;
  }

  .tp  { color: var(--clr-prompt, #2e2e2e); }
  .tlb { color: var(--clr-muted,  #666);    }
  .tsp { color: var(--clr-dim,    #444);    }
  .tvl {
    color: var(--clr-accent, #e8e8e8);
    font-weight: 700;
    letter-spacing: 0.03em;
    min-width: 3ch;
  }

  .t-cur {
    display: inline-block;
    width: 7px;
    height: 0.78em;
    background: var(--clr-accent, #e8e8e8);
    vertical-align: middle;
    margin-left: 1px;
    animation: t-blink 1.1s step-end infinite;
  }
  @keyframes t-blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .t2048-newbtn {
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    font-size: 0.78rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--clr-dim, #444);
    padding: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
    margin-top: 4px;
  }
  .t2048-newbtn .tp { transition: color 0.2s; }
  .t2048-newbtn:hover     { color: var(--clr-accent, #e8e8e8); }
  .t2048-newbtn:hover .tp { color: var(--clr-muted,  #666);    }

  /* ── Grid ────────────────────────────────────────────────────────── */
  .g-frame {
    display: flex;
    flex-direction: column;
    gap: 6px;           /* breathing room between rows */
    touch-action: none;
  }

  .g-row {
    display: flex;
    gap: 6px;
  }

  /* ── Cell — corner-bracket design ───────────────────────────────────
     Instead of a full border, only the four corners are drawn.
     --c  : corner color   (fades up with value)
     --s  : corner arm length
     All 8 lines (2 per corner × 4 corners) are CSS background gradients.
  ──────────────────────────────────────────────────────────────────── */
  .g-cell {
    flex: 1;
    aspect-ratio: 1;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;

    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    font-weight: 700;
    font-size: clamp(0.9rem, 5vw, 1.5rem);

    color: transparent;   /* empty cells show nothing */
    transition: color 0.12s, text-shadow 0.12s;

    /* Corner bracket variables */
    --c: rgba(255,255,255,0.07);
    --s: 10px;

    background-image:
      /* top-left */
      linear-gradient(var(--c), var(--c)),
      linear-gradient(var(--c), var(--c)),
      /* top-right */
      linear-gradient(var(--c), var(--c)),
      linear-gradient(var(--c), var(--c)),
      /* bottom-left */
      linear-gradient(var(--c), var(--c)),
      linear-gradient(var(--c), var(--c)),
      /* bottom-right */
      linear-gradient(var(--c), var(--c)),
      linear-gradient(var(--c), var(--c));
    background-size:
      var(--s) 1px,  1px var(--s),
      var(--s) 1px,  1px var(--s),
      var(--s) 1px,  1px var(--s),
      var(--s) 1px,  1px var(--s);
    background-position:
      top left,    top left,
      top right,   top right,
      bottom left, bottom left,
      bottom right,bottom right;
    background-repeat: no-repeat;
    background-color: transparent;
  }

  /* ── Value levels: corner brightness + text brightness + glow ──── */
  .g-cell[data-value]      { --s: 12px; }   /* bigger ticks when occupied */

  .g-cell[data-value="2"]  {
    --c  : rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.30);
  }
  .g-cell[data-value="4"]  {
    --c  : rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.45);
  }
  .g-cell[data-value="8"]  {
    --c  : rgba(255,255,255,0.33);
    color: rgba(255,255,255,0.60);
  }
  .g-cell[data-value="16"] {
    --c  : rgba(255,255,255,0.42);
    color: rgba(255,255,255,0.72);
  }
  .g-cell[data-value="32"] {
    --c  : rgba(255,255,255,0.52);
    color: rgba(255,255,255,0.84);
  }
  .g-cell[data-value="64"] {
    --c  : rgba(255,255,255,0.62);
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.28);
  }
  .g-cell[data-value="128"] {
    --c  : rgba(255,255,255,0.72);
    color: #fff;
    text-shadow: 0 0 14px rgba(255,255,255,0.48);
  }
  .g-cell[data-value="256"] {
    --c  : rgba(255,255,255,0.82);
    color: #fff;
    text-shadow: 0 0 18px rgba(255,255,255,0.62);
  }
  .g-cell[data-value="512"] {
    --c  : rgba(255,255,255,0.90);
    color: #fff;
    text-shadow: 0 0 22px rgba(255,255,255,0.78);
  }
  .g-cell[data-value="1024"] {
    --c  : rgba(255,255,255,0.96);
    --s  : 14px;
    color: #fff;
    text-shadow: 0 0 28px #fff, 0 0 8px rgba(255,255,255,0.50);
    font-size: clamp(0.72rem, 3.8vw, 1.15rem);
  }
  .g-cell[data-value="2048"] {
    --c  : #fff;
    --s  : 14px;
    color: #fff;
    text-shadow: 0 0 36px #fff, 0 0 60px rgba(255,255,255,0.35);
    font-size: clamp(0.72rem, 3.8vw, 1.15rem);
  }
</style>

<div class="t2048">

  <!-- Toolbar -->
  <div class="t2048-bar">
    <div class="t2048-line">
      <span class="tp">&gt;</span>
      <span class="tlb">score</span>
      <span class="tsp">:</span>
      <span id="score" class="tvl">0</span>
      <span class="t-cur"></span>
    </div>
    <div class="t2048-line">
      <span class="tp">&gt;</span>
      <span class="tlb">highest</span>
      <span class="tsp">:</span>
      <span id="highest" class="tvl">0</span>
    </div>
    <div class="t2048-line">
      <button class="t2048-newbtn" onclick="new_game();">
        <span class="tp">&gt;</span>
        <span>new_game()</span>
      </button>
    </div>
  </div>

  <!-- Game grid -->
  <div class="g-frame" style="touch-action: none;">
    <div class="g-row">
      <div class="g-cell" id="r1c1"></div>
      <div class="g-cell" id="r1c2"></div>
      <div class="g-cell" id="r1c3"></div>
      <div class="g-cell" id="r1c4"></div>
    </div>
    <div class="g-row">
      <div class="g-cell" id="r2c1"></div>
      <div class="g-cell" id="r2c2"></div>
      <div class="g-cell" id="r2c3"></div>
      <div class="g-cell" id="r2c4"></div>
    </div>
    <div class="g-row">
      <div class="g-cell" id="r3c1"></div>
      <div class="g-cell" id="r3c2"></div>
      <div class="g-cell" id="r3c3"></div>
      <div class="g-cell" id="r3c4"></div>
    </div>
    <div class="g-row">
      <div class="g-cell" id="r4c1"></div>
      <div class="g-cell" id="r4c2"></div>
      <div class="g-cell" id="r4c3"></div>
      <div class="g-cell" id="r4c4"></div>
    </div>
  </div>

</div>

<script src="{{ '/assets/script/2048.min.js' | relative_url }}" onload="init();"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {

    // ── 1. Highest score (localStorage) ────────────────────────────
    const scoreEl   = document.getElementById('score');
    const highestEl = document.getElementById('highest');

    const saved = parseInt(localStorage.getItem('2048_highest')) || 0;
    highestEl.innerText = saved;

    const scoreObserver = new MutationObserver(function () {
      const cur  = parseInt(scoreEl.innerText)   || 0;
      const high = parseInt(highestEl.innerText) || 0;
      if (cur > high) {
        highestEl.innerText = cur;
        localStorage.setItem('2048_highest', cur);
      }
    });

    if (scoreEl) {
      scoreObserver.observe(scoreEl, { childList: true, characterData: true, subtree: true });
    }

    // ── 2. data-value on cells → CSS corner-bracket levels ─────────
    document.querySelectorAll('.g-cell').forEach(function (cell) {
      new MutationObserver(function () {
        const val = cell.innerText.trim();
        if (val) {
          cell.setAttribute('data-value', val);
        } else {
          cell.removeAttribute('data-value');
        }
      }).observe(cell, { childList: true, characterData: true, subtree: true });
    });

    // ── 3. Mobile swipe ─────────────────────────────────────────────
    const gameFrame = document.querySelector('.g-frame');
    if (!gameFrame) return;

    let startX = 0, startY = 0;

    gameFrame.addEventListener('touchstart', function (e) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: false });

    gameFrame.addEventListener('touchend', function (e) {
      if (!startX || !startY) return;

      const diffX = startX - e.changedTouches[0].clientX;
      const diffY = startY - e.changedTouches[0].clientY;

      if (Math.abs(diffX) < 30 && Math.abs(diffY) < 30) return;

      let keyCode;
      if (Math.abs(diffX) > Math.abs(diffY)) {
        keyCode = diffX > 0 ? 37 : 39;  // Left : Right
      } else {
        keyCode = diffY > 0 ? 38 : 40;  // Up   : Down
      }

      document.dispatchEvent(new KeyboardEvent('keydown', { keyCode, which: keyCode }));
      document.dispatchEvent(new KeyboardEvent('keyup',   { keyCode, which: keyCode }));

      startX = 0;
      startY = 0;
    });

  });
</script>
