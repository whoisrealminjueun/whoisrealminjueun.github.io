<!-- _includes/2048_game.html -->
<style>
  .t2048 {
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    max-width: 440px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: var(--clr-fg, #c8c8c8);
    user-select: none;
  }

  .t2048-bar {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 2rem;
  }

  .t2048-line {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    line-height: 2;
  }

  .tp  { color: var(--clr-prompt, #2e2e2e); }
  .tlb { color: var(--clr-muted,  #666);    }
  .tsp { color: var(--clr-dim,    #444);    }
  .tvl {
    color: var(--clr-accent, #e8e8e8);
    font-weight: 700;
    letter-spacing: 0.03em;
    min-width: 3ch;
  }

  .t-cur {
    display: inline-block;
    width: 7px;
    height: 0.78em;
    background: var(--clr-accent, #e8e8e8);
    vertical-align: middle;
    margin-left: 1px;
    animation: t-blink 1.1s step-end infinite;
  }
  @keyframes t-blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .t2048-newbtn {
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    font-size: 0.78rem;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--clr-dim, #444);
    padding: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
    margin-top: 4px;
  }
  .t2048-newbtn .tp { transition: color 0.2s; }
  .t2048-newbtn:hover     { color: var(--clr-accent, #e8e8e8); }
  .t2048-newbtn:hover .tp { color: var(--clr-muted,  #666);    }

  /* ── Board: pure text, no decoration ── */
  .g-frame {
    display: flex;
    flex-direction: column;
    touch-action: none;
  }

  .g-row {
    display: flex;
  }

  .g-cell {
    flex: 1;
    height: 4.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono, 'JetBrains Mono', monospace);
    font-weight: 700;
    font-size: clamp(0.85rem, 4.5vw, 1.35rem);
    background: none;
    border: none;
    border-radius: 0;
    color: transparent;
    transition: color 0.1s, text-shadow 0.1s;
    position: relative;
  }

  /* middle dot for empty cells */
  .g-cell:not([data-value])::after {
    content: '·';
    color: rgba(255,255,255,0.10);
    font-weight: 400;
    position: absolute;
  }

  .g-cell[data-value="2"]    { color: rgba(255,255,255,0.28); }
  .g-cell[data-value="4"]    { color: rgba(255,255,255,0.42); }
  .g-cell[data-value="8"]    { color: rgba(255,255,255,0.56); }
  .g-cell[data-value="16"]   { color: rgba(255,255,255,0.67); }
  .g-cell[data-value="32"]   { color: rgba(255,255,255,0.78); }
  .g-cell[data-value="64"]   { color: rgba(255,255,255,0.88); }
  .g-cell[data-value="128"]  { color: #fff; }
  .g-cell[data-value="256"]  { color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.40); }
  .g-cell[data-value="512"]  { color: #fff; text-shadow: 0 0 18px rgba(255,255,255,0.58); }
  .g-cell[data-value="1024"] {
    color: #fff;
    text-shadow: 0 0 24px rgba(255,255,255,0.75);
    font-size: clamp(0.7rem, 3.6vw, 1.1rem);
  }
  .g-cell[data-value="2048"] {
    color: #fff;
    text-shadow: 0 0 32px #fff, 0 0 60px rgba(255,255,255,0.30);
    font-size: clamp(0.7rem, 3.6vw, 1.1rem);
  }
</style>

<div class="t2048">
  <div class="t2048-bar">
    <div class="t2048-line">
      <span class="tp">&gt;</span>
      <span class="tlb">score</span>
      <span class="tsp">:</span>
      <span id="score" class="tvl">0</span>
      <span class="t-cur"></span>
    </div>
    <div class="t2048-line">
      <span class="tp">&gt;</span>
      <span class="tlb">highest</span>
      <span class="tsp">:</span>
      <span id="highest" class="tvl">0</span>
    </div>
    <div class="t2048-line">
      <button class="t2048-newbtn" onclick="new_game();">
        <span class="tp">&gt;</span>
        <span>new_game()</span>
      </button>
    </div>
  </div>

  <div class="g-frame" style="touch-action: none;">
    <div class="g-row">
      <div class="g-cell" id="r1c1"></div>
      <div class="g-cell" id="r1c2"></div>
      <div class="g-cell" id="r1c3"></div>
      <div class="g-cell" id="r1c4"></div>
    </div>
    <div class="g-row">
      <div class="g-cell" id="r2c1"></div>
      <div class="g-cell" id="r2c2"></div>
      <div class="g-cell" id="r2c3"></div>
      <div class="g-cell" id="r2c4"></div>
    </div>
    <div class="g-row">
      <div class="g-cell" id="r3c1"></div>
      <div class="g-cell" id="r3c2"></div>
      <div class="g-cell" id="r3c3"></div>
      <div class="g-cell" id="r3c4"></div>
    </div>
    <div class="g-row">
      <div class="g-cell" id="r4c1"></div>
      <div class="g-cell" id="r4c2"></div>
      <div class="g-cell" id="r4c3"></div>
      <div class="g-cell" id="r4c4"></div>
    </div>
  </div>
</div>

<script src="{{ '/assets/script/2048.min.js' | relative_url }}" onload="init();"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const scoreEl   = document.getElementById('score');
    const highestEl = document.getElementById('highest');

    const saved = parseInt(localStorage.getItem('2048_highest')) || 0;
    highestEl.innerText = saved;

    new MutationObserver(function () {
      const cur  = parseInt(scoreEl.innerText)   || 0;
      const high = parseInt(highestEl.innerText) || 0;
      if (cur > high) {
        highestEl.innerText = cur;
        localStorage.setItem('2048_highest', cur);
      }
    }).observe(scoreEl, { childList: true, characterData: true, subtree: true });

    document.querySelectorAll('.g-cell').forEach(function (cell) {
      new MutationObserver(function () {
        const val = cell.innerText.trim();
        val ? cell.setAttribute('data-value', val)
            : cell.removeAttribute('data-value');
      }).observe(cell, { childList: true, characterData: true, subtree: true });
    });

    const frame = document.querySelector('.g-frame');
    if (!frame) return;

    let sx = 0, sy = 0;

    frame.addEventListener('touchstart', function (e) {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
    }, { passive: false });

    frame.addEventListener('touchend', function (e) {
      const dx = sx - e.changedTouches[0].clientX;
      const dy = sy - e.changedTouches[0].clientY;
      if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
      const k = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 37 : 39) : (dy > 0 ? 38 : 40);
      document.dispatchEvent(new KeyboardEvent('keydown', { keyCode: k, which: k }));
      document.dispatchEvent(new KeyboardEvent('keyup',   { keyCode: k, which: k }));
      sx = sy = 0;
    });
  });
</script>
